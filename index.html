<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoBash Webmail</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:     #3d8a96;
      --dark:     #111111;
      --nav-head: #2c2c2c;
      --bg:       #f3f4f6;
      --border:   #d0d3d8;
      --ph:       #9aa3ae;
      --txt:      #111111;
      --sub:      #5a6370;
      --white:    #ffffff;
      --red:      #c0392b;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
    }

    /* ── SVG illustration class resolution ── */
    /* GoDaddy uses utility class names — we resolve them to real colors here */
    .svg-fill-none        { fill: none; }
    .svg-fill-white       { fill: #ffffff; }
    .svg-fill-gray-dark   { fill: #2d3740; }
    .svg-fill-gray-light  { fill: #c8d0d8; }
    .svg-fill-primary-o   { fill: #1bba9a; }      /* teal */
    .svg-stroke-gray-dark { stroke: #2d3740; }
    .svg-stroke-gray-light{ stroke: #c8d0d8; }
    .svg-stroke-white     { stroke: #ffffff; }

    /* ── NAVBAR ── */
    .nav {
      background: var(--white);
      border-bottom: 1px solid #e1e4e8;
      height: 60px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .nav a { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav .brand { font-size: 1.45rem; font-weight: 700; color: var(--txt); letter-spacing: -0.3px; }
 .nav svg{
        width: 180px;
    }
    /* ── MAIN GRID ── */
    .main {
      display: grid;
      grid-template-columns: 53fr 47fr;
      min-height: calc(100vh - 60px - 52px);
      align-items: stretch;
    }
   .illus {
      flex: 1 1 0;
      display: flex;
      align-items: flex-start;      
      justify-content: flex-start;  
      padding: 48px 0 0 28px;       
      overflow: hidden;
    }
    .illus svg {
      width: 100%;
      max-width: 670px;             
      flex-shrink: 0;
    }

    /* ── RIGHT panel ── */
    .formside {
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 40px 32px 40px 28px;
    }

    /* ── CARD ── */
    .card { background: var(--white); border-radius: 5px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.09); }
    .card-head { background: var(--nav-head); padding: 45px 36px; text-align: center; }
    .card-head h1 { color: var(--white); font-size: 1.65rem; font-weight: 700; }
    .card-body { padding: 34px 36px 38px; }
    .sign-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 26px; }

    .field { margin-bottom: 12px; }
    .fi { position: relative; border: 1.5px solid var(--border); border-radius: 4px; transition: border-color .15s, box-shadow .15s; }
    .fi:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(27,186,154,0.11); }
    .fi input { width: 100%; padding: 17px 16px; font-size: .97rem; font-family: 'DM Sans', sans-serif; background: transparent; border: none; outline: none; color: var(--txt); }
    .fi input::placeholder { color: var(--ph); }

    .show-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--sub); font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500; }
    .show-btn:hover { color: var(--teal); }

    .cbrow { display: flex; align-items: center; gap: 11px; margin: 18px 0 20px; }
    .cbrow input[type=checkbox] { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; flex-shrink: 0; border: 2px solid var(--border); border-radius: 4px; background: var(--white); cursor: pointer; position: relative; transition: background .13s, border-color .13s; }
    .cbrow input:checked { background: var(--teal); border-color: var(--teal); }
    .cbrow input:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 12px; border: 2.5px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
    .cbrow label { font-size: .96rem; cursor: pointer; user-select: none; }

    .btn-in { width: 100%; padding: 17px; background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 1.05rem; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; transition: background .16s; }
    .btn-in:hover { background: #222; }

    .forgot { display: block; text-align: center; margin-top: 20px; font-size: .94rem; color: var(--sub); }
    .forgot a { color: var(--sub); text-decoration: underline; text-underline-offset: 2px; }
    .forgot a:hover { color: var(--teal); }

    .cta { margin-top: 22px; text-align: center; }
    .cta p { font-size: .95rem; font-weight: 700; margin-bottom: 13px; }
    .btn-start { width: 100%; padding: 16px; background: var(--white); color: var(--txt); font-family: 'DM Sans', sans-serif; font-size: .97rem; font-weight: 600; border: 1.5px solid var(--border); border-radius: 4px; cursor: pointer; transition: border-color .16s, background .16s; }
    .btn-start:hover { border-color: var(--teal); background: #f0fdf9; }

    /* ── Contact widget ── */
    .cw { position: fixed; bottom: 24px; right: 24px; z-index: 200; }
    .cw button { display: flex; align-items: center; gap: 9px; background: var(--white); border: 2px solid var(--dark); border-radius: 50px; padding: 10px 20px 10px 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 600; color: var(--txt); box-shadow: 0 3px 14px rgba(0,0,0,0.12); transition: box-shadow .15s; }
    .cw button:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.18); background: #f8f8f8; }
    .cw svg { width: 21px; height: 21px; flex-shrink: 0; }

    footer { background: var(--bg); border-top: 1px solid #e1e4e8; height: 52px; display: flex; align-items: center; justify-content: center; font-size: .77rem; color: var(--sub); padding: 0 20px; text-align: center; }
    footer a { color: var(--sub); text-decoration: underline; text-underline-offset: 2px; }
    footer a:hover { color: var(--teal); }
    .sep { margin: 0 3px; color: #c0c4ca; }

    @media (max-width: 860px) {
      .main { grid-template-columns: 1fr; }
      .illus { display: none; }
      .formside { padding: 36px 20px; align-items: center; }
      .formside > * { width: 100%; max-width: 480px; }
    }
  </style>
</head>
